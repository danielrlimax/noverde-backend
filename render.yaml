# render.yaml - Configuração para deploy no Render.com
# Documentação: https://render.com/docs/yaml-spec

services:
  - type: web
    name: solverde-api
    env: node
    region: oregon # ou ohio, frankfurt, singapore
    plan: free # ou starter, standard, pro
    
    # Build
    buildCommand: npm install && npm run build
    startCommand: npm start
    
    # Node.js version
    nodeVersion: 18
    
    # Health check
    healthCheckPath: /health
    
    # Ambiente
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      
      # Supabase - Configure no Dashboard do Render
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      
      # JWT - Configure no Dashboard do Render
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      
      # CORS - Configure com a URL do seu frontend na Vercel
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      
      # Rate Limiting
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: RATE_LIMIT_MAX_AUTH_REQUESTS
        value: "5"
      
      # Logs
      - key: LOG_LEVEL
        value: warn
    
    # Autoscaling (planos pagos)
    # autoscaling:
