# render.yaml - Configuração para deploy no Render.com

services:
  - type: web
    name: solverde-api
    env: node
    region: oregon
    plan: free
    
    # Build e Start
    buildCommand: npm install
    startCommand: npm start
    
    # Node.js version
    nodeVersion: "18"
    
    # Health check
    healthCheckPath: /health
    
    # Variáveis de ambiente
    envVars:
      - key: NODE_ENV
        value: production
